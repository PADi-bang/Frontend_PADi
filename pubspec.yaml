name: platform_absensi_digital
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0   # <--- TAMBAHKAN BARIS INI
  camera: ^0.10.5
  provider: ^6.1.5+1
  # Package yang hilang penyebab error merah
  geolocator: ^12.0.0
  intl: ^0.19.0
  tflite_flutter: ^0.11.0
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_padi.png"
  min_sdk_android: 21 # Sesuai dengan flutter default

flutter_native_splash:
  color: "#FAFAFA" # Mencocokkan dengan background di splash_screen.dart Anda
  image: assets/logo_padi.png
  android_12:
    color: "#FAFAFA"
    image: assets/logo_padi.png
  fullscreen: true

flutter:
  # Cukup tulis satu kali saja di sini
  uses-material-design: true

  # Bagian aset untuk logo splash screen Anda
  assets:
    - assets/logo_padi.png